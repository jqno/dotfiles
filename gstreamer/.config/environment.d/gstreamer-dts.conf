# Work around GStreamer's libdca-based DTS decoder (dtsdec) aborting the whole
# process on slightly corrupt DTS frames (assertion "length == size" in
# gstdtsdec.c). This crashes Nautilus thumbnailing and the file properties
# dialog for damaged DTS .mka/.mkv files. Ranking dtsdec to 0 makes GStreamer
# pick ffmpeg's tolerant avdec_dca decoder instead, which skips bad frames.
GST_PLUGIN_FEATURE_RANK=dtsdec:0
